		<div class="contact-modal-inner">
			<button class="cm-close" type="button" aria-label="Close" data-close><svg class="icon" viewBox="0 0 256 256" aria-hidden="true"><line x1="160" y1="96" x2="96" y2="160" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="12"/><line x1="96" y1="96" x2="160" y2="160" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="12"/><circle cx="128" cy="128" r="96" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="12"/></svg></button>

			<form class="contact-form" name="contact" action="thankyou.html" method="POST" data-netlify="true" data-netlify-honeypot="bot-field">

				<div class="field-row"><label for="cm-email">Your Email</label><input id="cm-email" type="email" name="email" required></div>
				<div class="field-row"><label for="cm-msg">Message</label><textarea id="cm-msg" name="message" rows="6" required></textarea></div>
				<div><button class="btn" type="submit">Send message <svg class="icon" viewBox="0 0 256 256" aria-hidden="true"><polyline points="96 48 176 128 96 208" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="20"/></svg></button></div>
