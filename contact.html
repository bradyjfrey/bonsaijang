	<h1 class="visually-hidden">Contact</h1>

	<section class="stripe stripe--field">
		<div class="wrap section--half bio-band">
			<span class="kicker">Contact</span>
			<p class="lede">Questions? Send a note and Stephen will get back to you.</p>
		</div>
	</section>

	<section class="stripe stripe--content">
		<div class="wrap section--half">
			<form class="contact-form" name="contact" action="thankyou.html" method="POST" data-netlify="true" data-netlify-honeypot="bot-field">
				<p hidden><label>Don't fill this out if you're human: <input name="bot-field"></label></p>
				<div class="field-row"><label for="cf-name">Your Name</label><input id="cf-name" type="text" name="name" required></div>
				<div class="field-row"><label for="cf-email">Your Email</label><input id="cf-email" type="email" name="email" required></div>
				<div class="field-row"><label for="cf-msg">Message</label><textarea id="cf-msg" name="message" rows="7" required></textarea></div>
				<div><button class="btn" type="submit">Send message <svg class="icon" viewBox="0 0 256 256" aria-hidden="true"><polyline points="96 48 176 128 96 208" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="20"/></svg></button></div>
			</form>
		</div>
	</section>
